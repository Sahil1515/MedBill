name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2.1.0 — no "v" prefix)'
        required: true
        default: '2.0.0'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: medbill
        run: npm ci

      - name: Bump version & build macOS DMG
        working-directory: medbill
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          npm run build:renderer
          npx electron-builder --mac --publish always

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: medbill
        run: npm ci

      - name: Bump version & build Windows installer
        working-directory: medbill
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          npm run build:renderer
          npx electron-builder --win --publish always
