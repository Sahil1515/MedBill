<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Successful — MedBill</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc; color: #1e293b;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px; text-align: center;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 48px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 480px; width: 100%;
    }
    .checkmark {
      width: 64px; height: 64px; background: #dcfce7; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin: 0 auto 24px;
    }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; }
    p { color: #64748b; line-height: 1.7; margin-bottom: 8px; }
    .highlight { color: #1d4ed8; font-weight: 600; }
    .steps {
      background: #f1f5f9; border-radius: 10px; padding: 20px 24px;
      margin: 28px 0; text-align: left;
    }
    .steps h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }
    .steps ol { padding-left: 20px; color: #334155; line-height: 2; font-size: 0.95rem; }
    .btn {
      display: inline-block; background: #1d4ed8; color: #fff;
      padding: 12px 28px; border-radius: 8px; text-decoration: none;
      font-weight: 600; font-size: 0.95rem; margin-top: 8px;
    }
    .btn:hover { background: #1e40af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkmark">✓</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for subscribing to MedBill.</p>
    <p class="highlight">Check your email for your license key.</p>
    <p style="font-size:0.88rem;color:#94a3b8;margin-top:4px">It may take a minute or two to arrive.</p>

    <div class="steps">
      <h3>Next steps</h3>
      <ol>
        <li>Open the email from MedBill</li>
        <li>Copy your license key</li>
        <li>Open MedBill on your PC and paste it in</li>
      </ol>
    </div>

    <a href="/" class="btn">Back to MedBill</a>
  </div>
</body>
</html>
